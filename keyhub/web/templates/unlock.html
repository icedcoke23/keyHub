<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ title }}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
<div class="scan-line"></div>
<div class="center-wrap">
  <div class="card center-card auth-page fade-in-up" style="text-align:center">
    <div class="vault-icon">🔓</div>
    <h1>解锁 KeyHub</h1>
    <div class="tagline">// AUTHENTICATE TO ACCESS VAULT</div>
    <div style="text-align:left;margin-top:20px">
      <label>主密码</label>
      <input id="pw" type="password" autocomplete="current-password" placeholder="••••••••••••" onkeydown="if(event.key==='Enter')unlockSubmit()">
      <div id="err" class="error"></div>
      <button style="margin-top:18px;width:100%" onclick="unlockSubmit()" id="submit-btn">
        <span id="btn-text">解锁</span>
      </button>
    </div>
  </div>
</div>
<script src="/static/app.js"></script>
</body>
</html>
