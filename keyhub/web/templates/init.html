<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ title }}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
<div class="scan-line"></div>
<div class="center-wrap">
  <div class="card center-card auth-page fade-in-up" style="text-align:center">
    <div class="vault-icon">🔐</div>
    <h1>初始化 KeyHub</h1>
    <div class="tagline">// ESTABLISH SECURE VAULT</div>
    <p class="muted" style="text-align:left;margin-bottom:18px">设置主密码。此密码用于派生主密钥加密所有凭证，<strong style="color:var(--warn)">无法找回</strong>，请妥善保管。</p>
    <div style="text-align:left">
      <label>主密码（至少 8 位）</label>
      <input id="pw" type="password" autocomplete="new-password" placeholder="••••••••••••">
      <div style="margin-top:12px">
        <label>确认密码</label>
        <input id="pw2" type="password" autocomplete="new-password" placeholder="••••••••••••">
      </div>
      <div id="err" class="error"></div>
      <button style="margin-top:18px;width:100%" onclick="initSubmit()" id="submit-btn">
        <span id="btn-text">初始化金库</span>
      </button>
      <div class="warning-box">
        ⚠ 主密码丢失 = 凭证永久无法解密<br>
        建议使用 12+ 位含大小写字母/数字/符号的强密码<br>
        建议立即创建加密备份
      </div>
    </div>
  </div>
</div>
<script src="/static/app.js"></script>
</body>
</html>
