services:
  keyhub:
    build: .
    container_name: keyhub
    restart: unless-stopped
    ports:
      - "127.0.0.1:8000:8000"
    volumes:
      - ./data:/app/data
      - ./.env:/app/.env:ro
    environment:
      - KEYHUB_ENV=production
      # 生产环境强烈建议通过环境变量注入主密码而非写入 .env
      # - KEYHUB_MASTER_PASSWORD=your-strong-password
